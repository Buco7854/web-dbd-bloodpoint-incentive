name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hub:
    name: Hub (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  web:
    name: Web + agent (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:web && npm run build:agent
